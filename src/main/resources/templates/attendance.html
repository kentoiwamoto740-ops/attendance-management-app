<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>勤怠管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>勤怠管理アプリ</h1>

<p>
    今日の日付:
    <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"></span>
</p>

<!-- 未出勤 -->
<div class="attendance-box" th:if="${attendance == null}">
    <p>未出勤です</p>
    <form action="/start" method="post">
        <button type="submit">出勤</button>
    </form>
</div>

<!-- 勤務中（休憩前） -->
<div class="attendance-box"
     th:if="${attendance != null and attendance.breakStartTime == null and attendance.endTime == null}">

    <p>
        出勤時間:
        <span th:text="${#temporals.format(attendance.startTime, 'HH:mm')}"></span>
    </p>

    <p>勤務中</p>

    <form action="/break/start" method="post">
        <button type="submit">休憩開始</button>
    </form>

    <form action="/end" method="post">
        <button type="submit">退勤</button>
    </form>

</div>

<!-- 休憩中 -->
<div class="attendance-box"
     th:if="${attendance != null and attendance.breakStartTime != null and attendance.breakEndTime == null and attendance.endTime == null}">

    <p>休憩中です</p>

    <form action="/break/end" method="post">
        <button type="submit">休憩終了</button>
    </form>

</div>

<!-- 勤務再開（休憩終了後） -->
<div class="attendance-box"
     th:if="${attendance != null and attendance.breakEndTime != null and attendance.endTime == null}">

    <p>
        出勤時間:
        <span th:text="${#temporals.format(attendance.startTime, 'HH:mm')}"></span>
    </p>

    <p>勤務再開中</p>

    <form action="/end" method="post">
        <button type="submit">退勤</button>
    </form>

</div>

<!-- 退勤済 -->
<div class="attendance-box"
     th:if="${attendance != null and attendance.endTime != null}">

    <p>
        出勤時間:
        <span th:text="${#temporals.format(attendance.startTime, 'HH:mm')}"></span>
    </p>

    <p>
        退勤時間:
        <span th:text="${#temporals.format(attendance.endTime, 'HH:mm')}"></span>
    </p>

    <p>本日は勤務終了です。</p>

</div>

<form th:action="@{/logout}" method="post" class="logout-form">
    <button type="submit" class="logout-button">ログアウト</button>
</form>

</body>
</html>
